name: Update Blocklists

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update blocklists from GitHub Advisory Database
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x update-lists.sh
          ./update-lists.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet lists/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lists/
          SUMMARY=$(git diff --cached --stat | tail -1)
          git commit -m "update malicious package blocklists

          $SUMMARY
          Source: GitHub Advisory Database (type=malware)"
          git push

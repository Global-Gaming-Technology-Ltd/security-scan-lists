name: Update Blocklists

on:
  schedule:
    # Mon-Sat: incremental (only new since last check)
    - cron: '0 6 * * 1-6'
    # Sunday: full scan (all pages, safety net)
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      full_scan:
        description: 'Run full scan (all pages)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update blocklists from GitHub Advisory Database
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x update-lists.sh
          # Full scan on Sundays or when manually requested
          DAY=$(date -u +%u)
          if [[ "$DAY" == "7" || "${{ inputs.full_scan }}" == "true" ]]; then
            ./update-lists.sh --full
          else
            ./update-lists.sh
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lists/ LAST_UPDATED.txt SCAN_STATE.txt || true
          git add -u SCAN_STATE.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            SUMMARY=$(git diff --cached --stat | tail -1)
            git commit -m "update blocklists — $(date -u '+%Y-%m-%d')

          $SUMMARY
          Source: GitHub Advisory Database (type=malware)"
            git push
          fi
